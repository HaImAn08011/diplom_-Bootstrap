{% extends "layout.html" %}
{% block content %}
<h2 class="mb-4">Админ-панель</h2>
<div class="card bg-light">
    <h5>Добавить книгу</h5>
    <form method="POST" class="row" style="gap: 1rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="text" name="title" class="form-control" placeholder="Название" required style="flex:2;">
        <input type="text" name="author" class="form-control" placeholder="Автор" required style="flex:1;">
        <input type="number" name="price" class="form-control" placeholder="Цена" required style="flex:1;">
        <input type="text" name="img" class="form-control" placeholder="URL картинки" style="flex:2;">
        <button type="submit" class="btn-success" style="padding:0.5rem;">Сохранить</button>
    </form>
</div>

<div class="table-responsive">
    <table>
        <thead>
            <tr><th>Название</th><th>Цена</th><th>Действие</th></tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.price }} ₽</td>
                <td><a href="/admin/delete/{{ book.id }}" class="text-danger">Удалить</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div class="mt-3">
    <a href="/admin/reservations" class="btn-outline-secondary" style="display:inline-block; padding:0.5rem 1rem;">📋 Управление бронями</a>
    <a href="/admin/pickup_by_code" class="btn-success" style="display:inline-block; padding:0.5rem 1rem;">🔓 Выдача по коду</a>
</div>
{% endblock %}
