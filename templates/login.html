{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <h3 class="text-center mb-4">Вход</h3>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary w-100">Войти</button>
                <a href="/login/google" class="btn-outline-secondary w-100 mt-2" style="display:block; text-align:center; background:#db4437; color:white;">Войти через Google</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
